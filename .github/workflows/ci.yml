name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///test.db"
      REDIS_URL: ""
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder"
      SUPABASE_JWT_SECRET: "placeholder"
      AUTH_ENABLED: "false"
      ALLOWED_ORIGINS: "http://localhost:3000"
      ANTHROPIC_API_KEY: ""
      POLYGON_API_KEY: ""
      FRED_API_KEY: ""
      SEC_EDGAR_EMAIL: "ci@example.com"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check backend/

      - name: Format check (ruff format)
        run: uv run ruff format --check backend/

      - name: Run tests
        run: uv run pytest tests/ -x -q

  frontend-lint:
    name: Frontend Lint & Build
    needs: backend-lint-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-next

    env:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api/v1"
      NEXT_PUBLIC_AUTH_ENABLED: "false"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build check
        run: npm run build
